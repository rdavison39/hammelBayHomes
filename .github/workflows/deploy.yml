name: Deploy Websites to AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy all sites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy sites
        run: |
          set -e

          echo "Starting deployment..."

          DEPLOYED=0
          SKIPPED=0
          ERRORS=0
          SUMMARY=""

          for domain_path in sites/*; do
            [ -d "$domain_path" ] || continue

            DOMAIN=$(basename "$domain_path")

            echo ""
            echo "========================================"
            echo "Processing domain: $DOMAIN"
            echo "========================================"

            if [ ! -d "$domain_path/root" ]; then
              echo "WARNING: $DOMAIN has no root folder"
            fi

            for site_path in "$domain_path"/*; do
              [ -d "$site_path" ] || continue

              SITE=$(basename "$site_path")

              # Skip hidden folders
              if [[ "$SITE" == .* ]]; then
                continue
              fi

              if [ "$SITE" = "root" ]; then
                BUCKET="www.$DOMAIN"
              else
                BUCKET="$SITE.$DOMAIN"
              fi

              echo ""
              echo "----------------------------------------"
              echo "Domain : $DOMAIN"
              echo "Site   : $SITE"
              echo "Bucket : $BUCKET"
              echo "Path   : $site_path"
              echo "----------------------------------------"

              if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
                echo "Deploying to s3://$BUCKET"

                # Sync static assets (long cache)
                aws s3 sync "$site_path" "s3://$BUCKET" \
                  --delete \
                  --exclude "*.html" \
                  --cache-control "public,max-age=31536000"

                # Sync HTML (no cache)
                aws s3 sync "$site_path" "s3://$BUCKET" \
                  --exclude "*" \
                  --include "*.html" \
                  --cache-control "no-cache"

                DEPLOYED=$((DEPLOYED+1))
                SUMMARY="${SUMMARY}\n✅ $BUCKET (deployed)"
              else
                echo "Skipping - bucket does not exist"

                SKIPPED=$((SKIPPED+1))
                SUMMARY="${SUMMARY}\n⚠️  $BUCKET (missing bucket)"
              fi
            done
          done

          echo ""
          echo "========================================"
          echo "DEPLOY SUMMARY"
          echo "========================================"
          echo -e "$SUMMARY"
          echo ""
          echo "Totals:"
          echo "Deployed: $DEPLOYED"
          echo "Skipped : $SKIPPED"
          echo "Errors  : $ERRORS"
          echo "========================================"